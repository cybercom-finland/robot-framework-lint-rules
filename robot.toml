[tool.robotcode]
python-path = ["./libraries"]

[tool.robotcode.robot]
paths = ["./processes", "./tests"]

[tool.robotcode.lint]
enabled = true

[tool.robocop]
exclude = ["deprecated.robot", "test.robot"]
language = ["en", "fi"]

[tool.robocop.lint]
select = [
    "rulename",
    "ruleid"
]
extend-select = [
    "additional-rule"
]
ignore = [
    "ruleid"
]
reports = ["all", "sarif"]
persistent = true
compare = true
configure = [
    "line-too-long.line_length=110"
]

[tool.robocop.format]
select = ["NormalizeNewLines"]
configure = [
    "NormalizeNewLines.section_lines=1"
]
diff = true
line_length = 110
skip = [
    "documentation"
]
reruns = 3
